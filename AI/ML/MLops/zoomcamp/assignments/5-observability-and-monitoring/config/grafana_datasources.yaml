# config file version
apiVersion: 1

# list of datasources to insert/update
# available in the database
datasources:
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: db:5432
    database: test
    user: postgres
    secureJsonData:
      password: ${ML_ZOOMCAMP_API_KEY}
    jsonData:
      sslmode: 'disable'
      database: test